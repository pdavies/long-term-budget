<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Long-Term Budget</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="app-title">
        <aside class="results-column">
          <div class="intro">
            <div>
              <p class="eyebrow">Finance model</p>
              <h1 id="app-title">Long-Term Budget</h1>
            </div>
            <div class="summary-strip" aria-label="Projection summary">
              <div>
                <span>Worth at 100</span>
                <strong id="worthAt100">£0</strong>
              </div>
              <div>
                <span>Lowest point</span>
                <strong id="lowestWorth">£0</strong>
              </div>
              <div>
                <span>Runway</span>
                <strong id="runway">Age 100+</strong>
              </div>
            </div>
          </div>

          <div class="graph-panel">
            <div class="chart-toolbar">
              <div>
                <h2>Expected net worth</h2>
                <p id="chartCaption">Projection from your current age to 100.</p>
              </div>
              <button class="ghost-button" id="resetButton" type="button">Reset</button>
            </div>
            <div class="chart-wrap">
              <svg id="netWorthChart" role="img" aria-labelledby="chartTitle chartDesc"></svg>
              <div class="chart-tooltip" id="chartTooltip" hidden></div>
            </div>
          </div>
        </aside>

        <form class="controls" id="financeForm">
          <section class="control-group" aria-labelledby="basics-title">
            <div class="group-heading">
              <h2 id="basics-title">Starting point</h2>
            </div>
            <div class="field-grid">
              <label class="range-field">
                <span>Current age <output id="currentAgeOut"></output></span>
                <input id="currentAge" type="range" min="18" max="90" step="1">
              </label>
              <label class="range-field">
                <span>Savings and investments <output id="currentWorthOut"></output></span>
                <input id="currentWorth" type="range" min="0" max="2000000" step="5000">
              </label>
              <label class="range-field">
                <span>Annual growth <output id="growthRateOut"></output></span>
                <input id="growthRate" type="range" min="-5" max="12" step="0.1">
              </label>
              <label class="range-field">
                <span>Monthly outgoings (exc mortgage) <output id="monthlyOutgoingsOut"></output></span>
                <input id="monthlyOutgoings" type="range" min="0" max="12000" step="50">
              </label>
              <label class="range-field">
                <span>Monthly income <output id="monthlyIncomeOut"></output></span>
                <input id="monthlyIncome" type="range" min="0" max="20000" step="50">
              </label>
              <label class="range-field">
                <span>Income stops at age <output id="incomeStopsAgeOut"></output></span>
                <input id="incomeStopsAge" type="range" min="18" max="100" step="1">
              </label>
            </div>
          </section>

          <section class="control-group" aria-labelledby="property-title">
            <div class="group-heading">
              <h2 id="property-title">Properties and mortgages</h2>
              <button class="compact-button" id="addProperty" type="button">Add</button>
            </div>
            <div class="item-list" id="propertyList"></div>
          </section>

          <section class="control-group" aria-labelledby="oneoff-title">
            <div class="group-heading">
              <h2 id="oneoff-title">One-off income</h2>
              <button class="compact-button" id="addOneOff" type="button">Add</button>
            </div>
            <div class="item-list" id="oneOffList"></div>
          </section>

          <section class="control-group" aria-labelledby="recurring-title">
            <div class="group-heading">
              <h2 id="recurring-title">Recurring income</h2>
              <button class="compact-button" id="addRecurring" type="button">Add</button>
            </div>
            <div class="item-list" id="recurringList"></div>
          </section>
        </form>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
